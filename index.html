<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свадебное приглашение</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f5f0ea;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .invitation-card {
      max-width: 800px;
      width: 100%;
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.06);
      padding: 40px 35px 45px;
      border: 1px solid #e2d6ca;
    }
    .ornament {
      text-align: center;
      font-size: 24px;
      letter-spacing: 10px;
      color: #b7a084;
      margin-bottom: 4px;
      opacity: 0.7;
    }
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      font-weight: 400;
      text-align: center;
      color: #3f2e1e;
      margin-top: -8px;
      margin-bottom: 4px;
    }
    .subhead {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #7d6854;
      border-top: 1px solid #ded1c4;
      border-bottom: 1px solid #ded1c4;
      padding: 12px 0;
      margin: 8px 0 20px 0;
    }
    .date-block {
      text-align: center;
      margin: 24px 0 14px 0;
    }
    .date-block .day {
      font-size: 2.6rem;
      font-weight: 500;
      color: #2b1f16;
      letter-spacing: 2px;
    }
    .date-block .month-year {
      font-size: 1.5rem;
      font-weight: 300;
      color: #5a4636;
      letter-spacing: 4px;
    }
    .address-block {
      background: #f3ede6;
      border-radius: 60px;
      padding: 16px 24px;
      text-align: center;
      margin: 14px 0 24px 0;
      border: 1px solid #dacfc4;
    }
    .address-block p {
      font-size: 1.3rem;
      font-weight: 400;
      color: #35281e;
      letter-spacing: 1px;
    }
    .address-block .address-icon {
      margin-right: 12px;
      font-size: 1.6rem;
      vertical-align: middle;
    }
    .address-block .city {
      font-weight: 500;
      color: #1f1610;
    }
    .dresscode-block {
      background: linear-gradient(145deg, #f1ebe3, #e9dfd4);
      border-radius: 60px;
      padding: 16px 22px;
      margin: 16px 0 26px 0;
      text-align: center;
      border: 1px solid #cfbcaa;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 18px;
    }
    .dresscode-block .label {
      font-weight: 500;
      letter-spacing: 2px;
      color: #3d2d1e;
      font-size: 0.95rem;
      text-transform: uppercase;
      background: rgba(255,255,255,0.3);
      padding: 4px 18px;
      border-radius: 40px;
    }
    .dresscode-block .colors {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .color-swatch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 400;
      color: #2d241b;
    }
    .color-swatch .circle {
      display: inline-block;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .circle-brown { background: #6b4f3a; }
    /* НОВЫЙ ЦВЕТ ГОЛУБОГО #00FFFF */
    .circle-blue { background: #42AAFF; }
    .dresscode-block .note {
      font-size: 0.85rem;
      color: #4d3b2b;
      font-weight: 300;
    }
    .photo-grid {
      display: flex;
      flex-direction: row;
      gap: 16px;
      margin: 28px 0 22px 0;
      justify-content: center;
      flex-wrap: wrap;
    }
    .photo-item {
      flex: 1 1 160px;
      min-width: 130px;
      max-width: 240px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
      background: #f4eee8;
      border: 2px solid #ede4da;
      transition: transform 0.2s ease;
    }
    .photo-item:hover {
      transform: scale(1.02);
      border-color: #b7a084;
    }
    .photo-item img {
      display: block;
      width: 100%;
      height: 190px;
      object-fit: cover;
    }
    .info-note {
      margin: 20px 0 16px;
      padding: 12px 18px;
      background: #faf6f0;
      border-radius: 40px;
      text-align: center;
      font-size: 0.95rem;
      color: #4d3d2e;
      border: 1px solid #e3d8cc;
      font-weight: 300;
    }
    .info-note i {
      font-style: normal;
      background: #e5d9ce;
      padding: 2px 14px;
      border-radius: 40px;
      margin: 0 4px;
      color: #3b2d21;
      font-weight: 400;
    }
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.8rem;
      color: #b09b88;
      letter-spacing: 1px;
      border-top: 1px solid #eee7df;
      padding-top: 22px;
    }
    .footer span {
      font-family: 'Great Vibes', cursive;
      font-size: 1.5rem;
      color: #9c846e;
      margin: 0 4px;
    }
    @media (max-width: 600px) {
      .invitation-card { padding: 28px 18px 30px; }
      h1 { font-size: 3rem; }
      .date-block .day { font-size: 2rem; }
      .address-block p { font-size: 1.05rem; }
      .photo-item { flex: 1 1 140px; min-width: 110px; max-width: 180px; }
      .photo-item img { height: 150px; }
      .dresscode-block { flex-direction: column; gap: 6px; padding: 14px 16px; }
    }
    @media (max-width: 420px) {
      .photo-grid { flex-direction: column; align-items: center; }
      .photo-item { max-width: 260px; width: 100%; }
      .photo-item img { height: 180px; }
    }
  </style>
</head>
<body>
<div class="invitation-card">
  <div class="ornament">✦ ✦ ✦</div>
  <h1>Приглашение</h1>
  <div class="subhead">на свадьбу</div>

  <div class="date-block">
    <div class="day">24 июля 2026</div>
    <div class="month-year">Четверг</div>
  </div>

  <div class="address-block">
    <p><span class="address-icon">📍</span> <span class="city">Иркутск, Академическая, 74</span></p>
  </div>

  <div class="dresscode-block">
    <span class="label">👔 Дресс-код</span>
    <div class="colors">
      <span class="color-swatch"><span class="circle circle-brown"></span> коричневый</span>
      <span class="color-swatch"><span class="circle circle-blue"></span> голубой</span>
    </div>
    <span class="note">(приветствуются оттенки)</span>
  </div>

  <!-- ТРИ ФОТО -->
  <div class="photo-grid">
    <div class="photo-item">
      <img src="1.jpg" alt="Фото 1">
    </div>
    <div class="photo-item">
      <img src="2.jpg" alt="Фото 2">
    </div>
    <div class="photo-item">
      <img src="3.jpg" alt="Фото 3">
    </div>
  </div>

  <div class="info-note">
    <i>💐</i> Сбор гостей в <strong>16:00</strong> <i>💐</i>
  </div>

  <div class="footer">
    <span>♡</span> с любовью, ваши молодожены <span>♡</span>
  </div>
</div>
</body>
</html>
